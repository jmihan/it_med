version: "3.8"

services:
  api:
    build: .
    command: python run_api.py
    ports:
      - "8000:8000"
    volumes:
      - ./weights:/app/weights
    environment:
      - MEDAI_API_KEYS=${MEDAI_API_KEYS:-dev-key-change-me}
      - MEDAI_CORS_ORIGINS=${MEDAI_CORS_ORIGINS:-*}
    restart: unless-stopped

  streamlit:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./weights:/app/weights
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - streamlit
    restart: unless-stopped
