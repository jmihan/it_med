# Настройки плагина для анализа дисплазии тазобедренного сустава

# Классификатор ResNet (опционально, второе мнение)
classifier_weights: "weights/classifier_resnet50_cropped.pt" #classifier.pt"
classifier_backbone: "resnet50"

# ROI-детектор YOLO (обрезка таза перед классификатором)
roi_weights: "weights/hip_roi_v2.pt"
roi_padding: 20

# Детектор ключевых точек (YOLO Pose)
model:
  name: "yolo11n_pose_hip"
  weights_path: "weights/hip_keypoints_v2.pt"
  input_size: [640, 640]
  device: "cpu"  # "cpu" или "cuda"
  conf_threshold: 0.5

# 10 ключевых точек
keypoints:
  names: ["L_TRC", "R_TRC", "L_ACE", "R_ACE", "L_FHC", "R_FHC", "L_FMM", "R_FMM", "L_FMP", "R_FMP"]
  count: 10

# Стратегия принятия решения: "resnet_primary" | "geometric"
decision_mode: "resnet_primary"

# Пороговые значения для постановки диагноза
clinical_thresholds:
  hilgenreiner_angle_max_normal: 25.0   # Норма для ~6 мес: 20-25°
  alpha_angle_min_normal: 60.0
  h_normal_mm: [8.0, 12.0]             # Высота h по Хильгенрейнеру (мм)
  d_normal_mm: [10.0, 15.0]            # Дистанция d по Хильгенрейнеру (мм)
  perkin_subluxation_tolerance_px: 10   # Толерантность для определения подвывиха (px)

# Настройки визуализации
visualization:
  colors:
    keypoints_trc: [0, 255, 0]     # Зелёный — Y-хрящи
    keypoints_ace: [255, 0, 0]     # Красный — крыша впадины
    keypoints_fhc: [0, 0, 255]     # Синий — головки бедра
    keypoints_fmm: [255, 165, 0]   # Оранжевый — метафизы
    keypoints_fmp: [0, 255, 255]   # Жёлто-зелёный — верхний край метафиза
    hilgenreiner_line: [0, 255, 0] # Зелёный
    acetabular_line: [255, 165, 0] # Оранжевый
    perkin_line: [255, 255, 0]     # Жёлтый
    normal_line: [0, 255, 0]       # Зелёный
    pathology_line: [0, 0, 255]    # Красный (BGR)
  line_thickness: 2
  point_radius: 5

# XAI
xai:
  enable_gradcam: false  # Для детекции точек Grad-CAM не нужен
